name: AI FullStack CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    env:
      MLFLOW_ENABLED: "false" # 🚨 disables MLflow in CI

    steps:
      # ---------------- CHECKOUT ---------------- #
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- PYTHON ---------------- #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------- UPGRADE TOOLS ---------------- #
      - name: Upgrade Build Tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # ---------------- DEPENDENCIES ---------------- #
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install streamlit

      # ---------------- FASTAPI START ---------------- #
      - name: Start FastAPI Backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          echo $! > fastapi.pid
          sleep 5

      # ---------------- DEBUG LOGS ---------------- #
      - name: Show FastAPI Logs
        run: |
          echo "===== FASTAPI LOG ====="
          cat api.log || echo "No logs found"

      # ---------------- WAIT FOR API ---------------- #
      - name: Wait for FastAPI
        run: |
          echo "Waiting for FastAPI..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/health > /dev/null; then
              echo "✅ FastAPI is running"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

          echo "❌ FastAPI failed to start"
          cat api.log
          exit 1

      # ---------------- VERIFY ROOT ---------------- #
      - name: Verify Root Endpoint
        run: |
          curl -s http://127.0.0.1:8000/ || true

      # ---------------- STREAMLIT ---------------- #
      - name: Start Streamlit App
        run: |
          nohup streamlit run streamlit_run_app.py \
            --server.port 8501 \
            --server.headless true > streamlit.log 2>&1 &
          echo $! > streamlit.pid
          sleep 10

      # ---------------- STREAMLIT LOGS ---------------- #
      - name: Show Streamlit Logs
        run: |
          cat streamlit.log || echo "No Streamlit logs"

      # ---------------- STREAMLIT CHECK ---------------- #
      - name: Check Streamlit
        run: |
          curl -s http://127.0.0.1:8501/ || true

      # ---------------- API TEST ---------------- #
      - name: Test Chat Endpoint
        run: |
          curl -X POST http://127.0.0.1:8000/chat \
            -H "Content-Type: application/json" \
            -d '{
              "api_key": "test",
              "messages": "hello",
              "session_id": "test",
              "chat_history": []
            }' || true

      # ---------------- COMPILE CHECK ---------------- #
      - name: Compile Python Code
        run: |
          python -m compileall app/

      # ---------------- FAILURE DEBUG ---------------- #
      - name: Debug Logs (On Failure)
        if: failure()
        run: |
          echo "===== FASTAPI LOG ====="
          cat api.log || true

          echo "===== STREAMLIT LOG ====="
          cat streamlit.log || true

          echo "===== PROCESS LIST ====="
          ps aux | grep -E "uvicorn|streamlit" || true

      # ---------------- CLEANUP ---------------- #
      - name: Cleanup Processes
        if: always()
        run: |
          [ -f fastapi.pid ] && kill $(cat fastapi.pid) || true
          [ -f streamlit.pid ] && kill $(cat streamlit.pid) || true
          pkill -f uvicorn || true
          pkill -f streamlit || true

      # ---------------- DONE ---------------- #
      - name: CI Success
        run: echo "✅ CI passed successfully"
