name: AI FullStack CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ---------------- #
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- PYTHON ---------------- #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------- DEPENDENCIES ---------------- #
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install streamlit

      # ---------------- START FASTAPI ---------------- #
      - name: Start FastAPI Backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          sleep 15

      # ---------------- WAIT FASTAPI ---------------- #
      - name: Wait for FastAPI
        run: |
          for i in {1..10}; do
            curl --fail http://127.0.0.1:8000/ && exit 0
            echo "Waiting for API..."
            sleep 3
          done
          echo "FastAPI failed to start"
          exit 1

      # ---------------- START STREAMLIT ---------------- #
      - name: Start Streamlit App
        run: |
          nohup streamlit run streamlit_run_app.py --server.port 8501 --server.headless true > streamlit.log 2>&1 &
          sleep 10

      # ---------------- TEST STREAMLIT ---------------- #
      - name: Check Streamlit
        run: |
          curl --fail http://127.0.0.1:8501/ || true

      # ---------------- API TEST ---------------- #
      - name: Test Chat Endpoint
        run: |
          curl -X POST http://127.0.0.1:8000/chat \
          -H "Content-Type: application/json" \
          -d '{
            "api_key": "test",
            "messages": "hello",
            "session_id": "test",
            "chat_history": []
          }' || true

      # ---------------- BUILD CHECK ---------------- #
      - name: Compile Python Code
        run: |
          python -m compileall app/

      # ---------------- DEBUG LOGS (ONLY ON FAIL) ---------------- #
      - name: Show Logs If Failed
        if: failure()
        run: |
          cat api.log || true
          cat streamlit.log || true

      # ---------------- DEPLOY HOOK ---------------- #
      - name: Deployment Ready
        run: echo "CI passed. Connect Render/Railway here."
